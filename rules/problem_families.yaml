# Canonical problem families for v2.1
#
# Converged to 7 stable categories.
# A stuck state is first navigated by:
# task -> journey_stage -> problem_family -> route
#
# Old values are mapped to new values via deprecated_families mapping.

registry_version: "1"

deprecated_families:
  environment: environment_or_config
  configuration: environment_or_config
  observability_gap: recovery_gap
  better_alternative_exists: capability_mismatch
  hook_vs_model_boundary: not_a_tooling_problem
  unknown: environment_or_config

problem_families:
  environment_or_config:
    description: "The task path is blocked by system/runtime limits, missing config, or incorrect setup."
    signals:
      - "permission denied"
      - "missing package or executable"
      - "network unavailable"
      - "sandbox restriction"
      - "credentials or config missing"
      - "wrong endpoint / missing permission scope"
      - "works elsewhere but not here"

  invocation:
    description: "The selected tool can probably do the job, but it was called the wrong way."
    signals:
      - "wrong flags, wrong prompt framing, wrong sequence"
      - "selector/timing/waiting issue"
      - "tool used without the required intermediate step"

  capability_mismatch:
    description: "The current tool path is a poor fit for the real task constraints."
    signals:
      - "static fetch used for dynamic page"
      - "file tool used when browser state is required"
      - "agent chooses a route that cannot satisfy core constraints"
      - "a better alternative tool family exists for this task"

  quality_miss:
    description: "The tool technically ran, but the result quality is not good enough."
    signals:
      - "format okay, usefulness low"
      - "result unstable across runs"
      - "output misses the actual user intent"

  task_framing_issue:
    description: "The tool choice confusion comes from an unclear or misframed task."
    signals:
      - "agent confuses desired output with artifact format"
      - "goal is underspecified"
      - "task should be split before picking a tool"

  recovery_gap:
    description: "The initial tool path failed, and the agent has no strong fallback path or visibility into what happened."
    signals:
      - "tool failed and the agent loops"
      - "retries repeat the same approach"
      - "fallbacks are not explicit"
      - "unclear whether failure came from config, environment, or content"
      - "tool reports too little"

  not_a_tooling_problem:
    description: "The issue is not meaningfully improved by changing tools."
    signals:
      - "user intent ambiguous"
      - "model reasoning gap with no tool-path leverage"
      - "external data simply unavailable"
      - "decision should not be left to model judgment — should be a hook or workflow"
