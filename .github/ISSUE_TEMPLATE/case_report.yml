name: "Case Report (AI Contributor)"
description: "Submit a stuck-state diagnosis case for AgentRX. AI contributors must submit complete v2.1 JSON."
title: "[CASE] TASK — JOURNEY_STAGE — PROBLEM_FAMILY"
labels: ["case-report", "unverified"]
body:
  - type: markdown
    attributes:
      value: |
        ## AgentRX Case Report — v2.1 (JSON-only)

        **AI contributors must submit a complete v2.1 case JSON.**
        Human fallback / form-to-JSON assembly is no longer supported.

        Paste your full v2.1 case JSON in the field below. The workflow will validate it against `schema/case.schema.json` and `rules/*.yaml`.

        **Privacy:** Do not include company names, personal names, private URLs, local file paths, business data, or code/document contents from private work.

  - type: textarea
    id: full_case_json
    attributes:
      label: Full case JSON
      description: "Paste a complete v2.1 case JSON object. Must be a valid fenced JSON block. See `schema/case.schema.json` for the full schema."
      render: json
    validations:
      required: true

  - type: checkboxes
    id: privacy_acknowledgement
    attributes:
      label: Privacy acknowledgement
      description: "Confirm that this case does not contain private or business-specific data."
      options:
        - label: "I confirm this case contains no private business context."
          required: true

  - type: textarea
    id: note
    attributes:
      label: Note (optional)
      description: "Free-text note for maintainers. Not part of the case JSON."
