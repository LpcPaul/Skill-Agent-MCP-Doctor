name: "Task-Path Case Report"
description: "Submit a task-first diagnosis case for AgentRX"
title: "[CASE] TASK_CATEGORY — JOURNEY_STAGE — PROBLEM_FAMILY"
labels: ["case-report", "unverified"]
body:
  - type: markdown
    attributes:
      value: |
        ## Privacy reminder

        Do **not** include:
        - company names
        - personal names
        - private URLs
        - local file paths
        - business data
        - code or document contents from private work

        Focus on:
        - the task
        - the stage
        - the symptom
        - the tool path
        - the next action

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - claude-code
        - claude-ai
        - openclaw
        - codex
        - cursor
        - gemini-cli
        - other
    validations:
      required: true

  - type: input
    id: task_category
    attributes:
      label: Task category
      description: "Human task, not tool name"
      placeholder: "e.g. browse-web"
    validations:
      required: true

  - type: input
    id: task_goal
    attributes:
      label: Task goal
      description: "Abstract user goal"
      placeholder: "e.g. Extract main content from a public webpage"
    validations:
      required: true

  - type: dropdown
    id: journey_stage
    attributes:
      label: Journey stage
      options:
        - understand-task
        - choose-capability
        - configure-capability
        - execute-task
        - validate-output
        - recover-from-failure
        - optimize-tool-path
    validations:
      required: true

  - type: textarea
    id: observed_symptom
    attributes:
      label: Observed symptom
      description: "Describe the surface symptom, not the full diagnosis"
      placeholder: "e.g. content extracted from the page was incomplete"
    validations:
      required: true

  - type: input
    id: tool_triggered
    attributes:
      label: Current tool path element
      placeholder: "e.g. browser-cdp"

  - type: dropdown
    id: tool_type
    attributes:
      label: Tool type
      options:
        - skill
        - mcp
        - plugin
        - builtin
        - agent
        - workflow
        - hook
        - unknown

  - type: dropdown
    id: suspected_problem_family
    attributes:
      label: Suspected problem family
      options:
        - environment
        - configuration
        - invocation
        - capability_mismatch
        - quality_miss
        - observability_gap
        - recovery_gap
        - better_alternative_exists
        - hook_vs_model_boundary
        - task_framing_issue
        - not_a_tooling_problem
        - unknown
    validations:
      required: true

  - type: textarea
    id: attempted_actions
    attributes:
      label: Attempted actions
      description: "What was already tried?"
      placeholder: |
        - retried current tool
        - changed output format request
        - checked one alternative

  - type: textarea
    id: desired_outcome
    attributes:
      label: Desired outcome
      description: "What are you actually trying to accomplish next?"
      placeholder: "e.g. choose a better tool path and continue the task"

  - type: dropdown
    id: recommended_next_step
    attributes:
      label: Recommended next step
      options:
        - adjust_current_tool_invocation
        - switch_tool_within_same_task
        - inspect_environment_or_permissions
        - move_to_hook_or_workflow
        - reframe_task_before_retry
        - ask_for_one_missing_constraint
        - stop_tooling_changes_not_a_tool_issue
        - other

  - type: textarea
    id: recommendation_detail
    attributes:
      label: Recommendation detail
      description: "Why this next step, and what are the candidate alternatives?"
      placeholder: |
        Primary: switch to web-access skill
        Why: current tool is too weak for dynamic rendering
        Alternatives: playwright-mcp (better for interaction), web_fetch (simpler but less capable)

  - type: dropdown
    id: outcome
    attributes:
      label: Outcome
      options:
        - resolved
        - partially_resolved
        - unresolved
        - unknown

  - type: dropdown
    id: confidence
    attributes:
      label: Confidence
      options:
        - high
        - medium
        - low

  - type: textarea
    id: full_json
    attributes:
      label: Full case JSON (optional)
      description: "Paste a v2 case object if available"
      render: json
