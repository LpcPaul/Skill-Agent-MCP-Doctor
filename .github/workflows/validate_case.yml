name: Validate Case Report

on:
  issues:
    types: [opened, edited]

jobs:
  validate:
    if: contains(github.event.issue.labels.*.name, 'case-report')
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Run CI self-test
        id: self_test
        run: |
          RESULT=$(python3 scripts/ci_self_test.py 2>&1) || EXIT_CODE=$?
          echo "result<<EOF" >> $GITHUB_OUTPUT
          echo "$RESULT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "exit_code=${EXIT_CODE:-0}" >> $GITHUB_OUTPUT

      - name: Extract JSON from issue body
        id: extract
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body || '';
            const jsonMatch = body.match(/```json\s*\n([\s\S]*?)\n```/);
            if (jsonMatch) {
              const fs = require('fs');
              fs.writeFileSync('/tmp/case_from_issue.json', jsonMatch[1]);
              core.setOutput('has_json', 'true');
            } else {
              core.setOutput('has_json', 'false');
            }

      - name: Post validation comment
        uses: actions/github-script@v7
        with:
          script: |
            const hasJson = '${{ steps.extract.outputs.has_json }}' === 'true';
            const testResult = `${{ steps.self_test.outputs.result }}`;
            const testExit = '${{ steps.self_test.outputs.exit_code }}';

            let comment = '## AgentRX — Automated Validation\n\n';

            if (testExit === '0') {
              comment += '✅ CI self-test passed (schema, YAML, cross-file consistency).\n\n';
            } else {
              comment += '⚠️ CI self-test failed:\n\n```\n' + testResult + '\n```\n\n';
            }

            if (hasJson) {
              comment += '📋 JSON case payload found — manual review recommended.\n\n';
            } else {
              comment += 'ℹ️ No embedded JSON block found. Manual review needed.\n\n';
            }

            comment += 'Preferred review lens for v2:\n';
            comment += '- task category is clear\n';
            comment += '- journey stage is correct\n';
            comment += '- symptom is concrete\n';
            comment += '- desired_outcome is stated\n';
            comment += '- next action is actionable\n';
            comment += '- private business context is absent\n';

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: comment
            });
