name: Validate Cases

on:
  push:
    branches: [main]
    paths:
      - "cases/**"
      - "schema/**"
      - "rules/**"
      - "scripts/**"
  pull_request:
    branches: [main]
    paths:
      - "cases/**"
      - "schema/**"
      - "rules/**"
      - "scripts/**"
  issues:
    types: [opened, edited]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Run CI self-test
        id: self_test
        run: |
          python3 scripts/ci_self_test.py

  validate-issue-case:
    if: github.event_name == 'issues' && contains(github.event.issue.labels.*.name, 'case-report')
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Extract JSON from issue body
        id: extract
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body || '';
            const jsonMatch = body.match(/```json\s*\n([\s\S]*?)\n```/);
            if (jsonMatch) {
              const fs = require('fs');
              fs.writeFileSync('/tmp/case_from_issue.json', jsonMatch[1]);
              core.setOutput('has_json', 'true');
            } else {
              core.setOutput('has_json', 'false');
            }

      - name: Validate case
        if: steps.extract.outputs.has_json == 'true'
        id: validate
        run: |
          RESULT=$(python3 scripts/validate_case.py --input /tmp/case_from_issue.json 2>&1) || EXIT_CODE=$?
          echo "result<<EOF" >> $GITHUB_OUTPUT
          echo "$RESULT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "exit_code=${EXIT_CODE:-0}" >> $GITHUB_OUTPUT

      - name: Post validation comment
        if: steps.extract.outputs.has_json == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const validateResult = `${{ steps.validate.outputs.result }}`;
            const validateExit = '${{ steps.validate.outputs.exit_code }}';

            let comment = '## AgentRX — Case Validation (v2.1)\n\n';

            if (validateExit === '0') {
              comment += '✅ Case passed v2.1 schema validation.\n\n';
            } else {
              comment += '❌ Case validation failed:\n\n```\n' + validateResult + '\n```\n\n';
            }

            comment += 'Review checklist:\n';
            comment += '- [ ] evidence.task is a human task, not a tool name\n';
            comment += '- [ ] evidence.desired_outcome is stated\n';
            comment += '- [ ] evidence.symptom is observable, not diagnostic\n';
            comment += '- [ ] inference.why_current_path_failed explains the mismatch\n';
            comment += '- [ ] inference.best_candidate_route_id is a route id (not a tool name)\n';
            comment += '- [ ] inference.confidence is set\n';
            comment += '- [ ] No private business context\n';

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: comment
            });
