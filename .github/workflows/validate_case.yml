name: Validate Cases

on:
  push:
    branches: [main]
    paths:
      - "cases/**"
      - "schema/**"
      - "rules/**"
      - "scripts/**"
  pull_request:
    branches: [main]
    paths:
      - "cases/**"
      - "schema/**"
      - "rules/**"
      - "scripts/**"
  issues:
    types: [opened, edited]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml jsonschema

      - name: Run CI self test
        run: python3 scripts/ci_self_test.py

  validate-issue-case:
    if: github.event_name == 'issues' && contains(github.event.issue.labels.*.name, 'case-report')
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml jsonschema

      # Step 1: Extract fenced JSON block from issue body
      - name: Extract JSON block
        id: extract
        run: |
          echo "${{ github.event.issue.body }}" > /tmp/issue_body.txt
          if grep -q '```json' /tmp/issue_body.txt; then
            sed -n '/```json/,/```/p' /tmp/issue_body.txt | grep -v '```' > /tmp/case_from_issue.json
            echo "found=true" >> $GITHUB_OUTPUT
          else
            echo "found=false" >> $GITHUB_OUTPUT
          fi

      # Step 2: Validate case JSON
      - name: Validate case
        if: steps.extract.outputs.found == 'true'
        id: validate
        run: |
          RESULT=$(python3 scripts/validate_case.py --input /tmp/case_from_issue.json 2>&1) || EXIT_CODE=${?}
          echo "result<<EOF" >> $GITHUB_OUTPUT
          echo "$RESULT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "exit_code=${EXIT_CODE:-0}" >> $GITHUB_OUTPUT

      # Step 3: Post validation comment
      - name: Post validation comment
        if: steps.extract.outputs.found == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const validateResult = `${{ steps.validate.outputs.result }}`;
            const validateExit = '${{ steps.validate.outputs.exit_code }}';

            let comment = '## AgentRX — Case Validation (v2.1)\n\n';

            if (validateExit === '0') {
              comment += '✅ Case passed v2.1 schema validation.\n\n';
            } else {
              comment += '❌ Case validation failed:\n\n```\n' + validateResult + '\n```\n\n';

              if (validateResult.includes('Missing required')) {
                comment += '**Error:** Missing required field(s). Check evidence and inference sections.\n\n';
              } else if (validateResult.includes('route') || validateResult.includes('best_candidate_route_id')) {
                comment += '**Error:** Invalid route id. Must be from `rules/routes.yaml`.\n\n';
              } else if (validateResult.includes('schema') || validateResult.includes('enum') || validateResult.includes('not in allowed values')) {
                comment += '**Error:** Schema violation. Check field types and enum values against `schema/case.schema.json`.\n\n';
              } else if (validateResult.includes('JSON') || validateResult.includes('parse')) {
                comment += '**Error:** JSON parse error. Ensure valid JSON format.\n\n';
              }
            }

            comment += '**Reminder:** AI contributors must submit complete v2.1 JSON. Human fallback is no longer supported.\n';

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: comment
            });

      # Step 4: Post error if no JSON block found
      - name: Post missing JSON error
        if: steps.extract.outputs.found == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const comment = '## AgentRX — Case Validation (v2.1)\n\n'
              + '❌ No fenced JSON block found in the issue body.\n\n'
              + '**AgentRX now accepts complete v2.1 JSON only.** Human fallback / form-to-JSON assembly is no longer supported.\n\n'
              + 'Please paste a complete v2.1 case JSON in the `full_case_json` field.\n'
              + 'See `schema/case.schema.json` for the full schema.';

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: comment
            });
