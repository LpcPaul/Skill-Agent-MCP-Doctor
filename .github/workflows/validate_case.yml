name: Validate Cases

on:
  push:
    branches: [main]
    paths:
      - "cases/**"
      - "schema/**"
      - "rules/**"
      - "scripts/**"
  pull_request:
    branches: [main]
    paths:
      - "cases/**"
      - "schema/**"
      - "rules/**"
      - "scripts/**"
  issues:
    types: [opened, edited]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Run CI self-test
        run: python3 scripts/ci_self_test.py

  validate-issue-case:
    if: github.event_name == 'issues' && contains(github.event.issue.labels.*.name, 'case-report')
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml

      # Step 1: Write issue body to file for parsing
      - name: Write issue body to file
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            fs.writeFileSync('/tmp/issue_body.txt', context.payload.issue.body || '');

      # Step 2: Try to extract full JSON block first (backward compat)
      - name: Check for embedded JSON block
        id: check_json
        run: |
          if grep -q '```json' /tmp/issue_body.txt; then
            sed -n '/```json/,/```/p' /tmp/issue_body.txt | grep -v '```' > /tmp/case_from_issue.json
            echo "has_json=true" >> $GITHUB_OUTPUT
          else
            echo "has_json=false" >> $GITHUB_OUTPUT
          fi

      # Step 3: If no JSON block, assemble from form fields
      - name: Assemble case JSON from form fields
        if: steps.check_json.outputs.has_json != 'true'
        id: assemble
        run: |
          python3 scripts/parse_issue_form.py --body-file /tmp/issue_body.txt --output /tmp/case_from_issue.json
          echo "assembled=true" >> $GITHUB_OUTPUT

      # Step 4: Validate the case (works for both paths)
      - name: Validate case
        id: validate
        run: |
          RESULT=$(python3 scripts/validate_case.py --input /tmp/case_from_issue.json 2>&1) || EXIT_CODE=$?
          echo "result<<EOF" >> $GITHUB_OUTPUT
          echo "$RESULT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "exit_code=${EXIT_CODE:-0}" >> $GITHUB_OUTPUT

      # Step 5: Post comment with results
      - name: Post validation comment
        uses: actions/github-script@v7
        with:
          script: |
            const validateResult = `${{ steps.validate.outputs.result }}`;
            const validateExit = '${{ steps.validate.outputs.exit_code }}';
            const wasAssembled = '${{ steps.assemble.outputs.assembled }}' === 'true';

            let comment = '## AgentRX — Case Validation (v2.1)\n\n';

            if (wasAssembled) {
              comment += '📋 Case JSON was assembled from form fields.\n\n';
            }

            if (validateExit === '0') {
              comment += '✅ Case passed v2.1 schema validation.\n\n';
            } else {
              comment += '❌ Case validation failed:\n\n```\n' + validateResult + '\n```\n\n';
            }

            comment += 'Review checklist:\n';
            comment += '- [ ] evidence.task is a human task, not a tool name\n';
            comment += '- [ ] evidence.desired_outcome is stated\n';
            comment += '- [ ] evidence.symptom is observable, not diagnostic\n';
            comment += '- [ ] inference.why_current_path_failed explains the mismatch\n';
            comment += '- [ ] inference.best_candidate_route_id is a route id (not a tool name)\n';
            comment += '- [ ] inference.confidence is set\n';
            comment += '- [ ] No private business context\n';

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: comment
            });
